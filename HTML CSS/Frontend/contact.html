<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Contact Form</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>


  <!-- header and navigation bar -->
  <header>
    <div class="nav-container">
           <a href="index.html" style="text-decoration: none; color: yellow;">EduBridge</a></h1>
      <nav>
        <ul class="nav-links">
        <li><a href="Login.html">Login</a></li>
          <li><a href="contact.html">Contact Us</a></li>
        </ul>
      </nav>
    </div>
  </header>
  <div class="contact-container">
    <div class="contact-card">



      <h2>Contact Us</h2>
      <p class="contact-subtitle">
        We would love to hear from you
      </p>

      <form id="contactForm" class="contact-form">

        <div class="form-group">
          <label>Name</label>
          <input name="name" placeholder="Enter your name" required />
        </div>

        <div class="form-group">
          <label>Email</label>
          <input name="email" placeholder="Enter your email" required />
        </div>

        <div class="form-group">
          <label>Category</label>
          <select name="category" required>
            <option value="">Select Category</option>
            <option value="teachers">Teachers</option>
            <option value="parents">Parents</option>
            <option value="ngos">NGOs</option>
            <option value="volunteers">Volunteers</option>
          </select>
        </div>

        <div class="form-group">
          <label>Subject</label>
          <input name="subject" placeholder="Enter subject" required />
        </div>

        <div class="form-group">
          <label>Message</label>
          <textarea name="message" placeholder="Write your message" required></textarea>
        </div>

        <button type="submit" class="submit-btn">
          Send Message
        </button>

      </form>
    </div>
  </div>

  <footer>
  <p>&copy; 2026 EduBridge</p>
  <p>Connecting teachers and students together for a brighter future.</p>
  <p>Tel: 02079462958</p>
  <p>Email: info@edubridge.org</p>
</footer>

  <script src="script.js"></script>
</body>

</html>
